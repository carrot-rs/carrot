[package]
name = "carrot-notifications"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/notifications.rs"
doctest = false

[features]
test-support = [
    "carrot-channel/test-support",

    "inazuma/test-support",
    "carrot-rpc/test-support",
]

[dependencies]
anyhow.workspace = true
carrot-channel.workspace = true
carrot-client.workspace = true
inazuma-component-registry.workspace = true
carrot-db.workspace = true
inazuma.workspace = true
carrot-rpc.workspace = true
inazuma-sum_tree.workspace = true
time.workspace = true
carrot-ui.workspace = true
inazuma-util.workspace = true
carrot-workspace.workspace = true
carrot-actions.workspace = true

[dev-dependencies]
carrot-client = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
carrot-rpc = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
