[package]
name = "carrot-component-preview"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/component_preview.rs"

[features]
default = []
test-support = ["carrot-db/test-support"]

[dependencies]
anyhow.workspace = true
carrot-client.workspace = true
inazuma-collections.workspace = true
inazuma-component-registry.workspace = true
carrot-db.workspace = true
carrot-fs.workspace = true
inazuma.workspace = true
carrot-language.workspace = true
log.workspace = true
carrot-node-runtime.workspace = true
carrot-notifications.workspace = true
carrot-project.workspace = true
carrot-release-channel.workspace = true
carrot-reqwest-client.workspace = true
carrot-session.workspace = true
inazuma-settings-framework.workspace = true
carrot-theme.workspace = true
carrot-theme-settings.workspace = true
carrot-ui.workspace = true
carrot-ui-input.workspace = true
uuid.workspace = true
carrot-workspace.workspace = true

[dev-dependencies]
inazuma-platform = { workspace = true, features = ["screen-capture"] }

[[example]]
name = "component_preview"
path = "examples/component_preview.rs"
