[package]
name = "carrot-cmdline"
version = "0.1.0"
edition = "2024"
description = "Semantic-AST shell command-entry surface (wraps carrot-editor)"
publish = false
license-file.workspace = true

[lib]
path = "src/lib.rs"
doctest = false

[dependencies]
inazuma.workspace = true
inazuma-menu.workspace = true
inazuma-util.workspace = true
carrot-completions.workspace = true
carrot-editor.workspace = true
carrot-multi-buffer.workspace = true
carrot-session.workspace = true
carrot-shell-integration.workspace = true
tree-sitter.workspace = true
tree-sitter-bash.workspace = true
tree-sitter-zsh.workspace = true
tree-sitter-fish.workspace = true
tree-sitter-nu.workspace = true

[dev-dependencies]
criterion.workspace = true
proptest.workspace = true

[[bench]]
name = "pipeline"
harness = false

[[bench]]
name = "latency_p99"
harness = false

[lints]
workspace = true
