[package]
name = "inazuma-picker"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true
description = "Generic fuzzy-search picker modal"

[lints]
workspace = true

[lib]
path = "src/picker.rs"
doctest = false

[features]
test-support = []

[dependencies]
inazuma = { workspace = true }
inazuma-menu = { workspace = true }
carrot-ui = { workspace = true }
inazuma-fuzzy = { workspace = true }
carrot-theme = { workspace = true }
carrot-workspace = { workspace = true }
carrot-actions = { workspace = true }
carrot-ui-input = { workspace = true }
carrot-theme-settings = { workspace = true }
anyhow.workspace = true
schemars.workspace = true
serde.workspace = true
log = { workspace = true }

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
carrot-editor.workspace = true
carrot-theme = { workspace = true, features = ["test-support"] }
carrot-theme-settings.workspace = true
