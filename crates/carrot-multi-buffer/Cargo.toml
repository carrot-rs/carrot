[package]
name = "carrot-multi-buffer"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/multi_buffer.rs"
doctest = false

[features]
test-support = [
    "carrot-buffer-diff/test-support",
    "inazuma/test-support",
    "carrot-language/test-support",
    "inazuma-text/test-support",
    "inazuma-util/test-support",
]

[dependencies]
anyhow.workspace = true
inazuma-clock.workspace = true
inazuma-collections.workspace = true
ctor.workspace = true
carrot-buffer-diff.workspace = true
inazuma.workspace = true
itertools.workspace = true
carrot-language.workspace = true
log.workspace = true
parking_lot.workspace = true
rand.workspace = true
inazuma-rope.workspace = true
smol.workspace = true
inazuma-settings-framework.workspace = true
serde.workspace = true
smallvec.workspace = true
inazuma-sum_tree.workspace = true
inazuma-text.workspace = true
carrot-theme.workspace = true
tree-sitter.workspace = true
carrot-tracing.workspace = true
tracing.workspace = true
inazuma-util.workspace = true
unicode-segmentation.workspace = true

[dev-dependencies]
carrot-buffer-diff = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
carrot-language = { workspace = true, features = ["test-support"] }
pretty_assertions.workspace = true
rand.workspace = true
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
inazuma-text = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
carrot-log.workspace = true

[package.metadata.cargo-machete]
ignored = ["tracing"]
