[package]
name = "carrot-search"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[features]
test-support = [

    "carrot-editor/test-support",
    "inazuma/test-support",
    "carrot-workspace/test-support",
]

[lints]
workspace = true

[lib]
path = "src/search.rs"
doctest = false

[dependencies]
anyhow.workspace = true
any_vec.workspace = true
bitflags.workspace = true
inazuma-collections.workspace = true
carrot-editor.workspace = true
carrot-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
carrot-language.workspace = true
inazuma-menu.workspace = true
carrot-multi-buffer.workspace = true
carrot-project.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smol.workspace = true
carrot-theme.workspace = true
carrot-theme-settings.workspace = true
carrot-ui.workspace = true
inazuma-util.workspace = true
inazuma-util-macros.workspace = true
carrot-workspace.workspace = true
carrot-actions.workspace = true
itertools.workspace = true
carrot-tracing.workspace = true
tracing.workspace = true

[dev-dependencies]
carrot-editor = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
carrot-language = { workspace = true, features = ["test-support"] }
carrot-lsp.workspace = true
pretty_assertions.workspace = true
unindent.workspace = true
carrot-workspace = { workspace = true, features = ["test-support"] }

[package.metadata.cargo-machete]
ignored = ["tracing"]
