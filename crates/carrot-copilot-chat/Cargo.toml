[package]
name = "carrot-copilot-chat"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/copilot_chat.rs"
doctest = false

[features]
default = []
test-support = [
    "inazuma-collections/test-support",
    "inazuma/test-support",
    "inazuma-settings-framework/test-support",
]

[dependencies]
carrot-anthropic.workspace = true
anyhow.workspace = true
inazuma-collections.workspace = true
dirs.workspace = true
carrot-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
carrot-http-client.workspace = true
log.workspace = true
carrot-paths.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
serde_json.workspace = true
