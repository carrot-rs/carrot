[package]
name = "carrot-project"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/project.rs"
doctest = false
test = false

[[test]]
name = "integration"
required-features = ["test-support"]
path = "tests/integration/project_tests.rs"

[features]
test-support = [
    "carrot-buffer-diff/test-support",
    "carrot-client/test-support",
    "carrot-language/test-support",
    "carrot-remote/test-support",
    "inazuma-settings-framework/test-support",
    "carrot-snippet-provider/test-support",
    "inazuma-text/test-support",
    "carrot-prettier/test-support",
    "carrot-worktree/test-support",
    "inazuma/test-support",
    "carrot-dap/test-support",
]

