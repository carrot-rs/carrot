[package]
authors = ["Carrot Contributors"]
default-run = "carrot-collab"
edition.workspace = true
name = "carrot-collab"
version = "0.44.0"
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[[bin]]
name = "carrot-collab"

[features]
sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]
test-support = ["sqlite"]

[lib]
test = false

[[test]]
name = "collab_tests"
required-features = ["test-support"]
path = "tests/integration/collab_tests.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
async-tungstenite = { workspace = true, features = ["tokio", "tokio-rustls-manual-roots" ] }
aws-config.workspace = true
aws-sdk-kinesis.workspace = true
aws-sdk-s3.workspace = true
axum.workspace = true
chrono.workspace = true
inazuma-clock.workspace = true
carrot-cloud-api-types.workspace = true
inazuma-collections.workspace = true
dashmap.workspace = true
envy.workspace = true
futures.workspace = true
inazuma.workspace = true
hex.workspace = true
carrot-http-client.workspace = true
carrot-livekit-api.workspace = true
log.workspace = true
nanoid.workspace = true
parking_lot.workspace = true
prometheus.workspace = true
prost.workspace = true
rand.workspace = true
reqwest = { workspace = true, features = ["json"] }
carrot-rpc.workspace = true
# sea-orm and sea-orm-macros versions must match exactly.
sea-orm.workspace = true
sea-orm-macros.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
sqlx.workspace = true
strum.workspace = true
carrot-telemetry-events.workspace = true
inazuma-text.workspace = true
time.workspace = true
tokio = { workspace = true, features = ["full"] }
toml.workspace = true
tower.workspace = true
tower-http = { workspace = true, features = ["trace"] }
tracing.workspace = true
tracing-subscriber.workspace = true # workaround for https://github.com/tokio-rs/tracing/issues/2927
inazuma-util.workspace = true
uuid.workspace = true

[dev-dependencies]
carrot-agent = { workspace = true, features = ["test-support"] }



carrot-assistant-text-thread.workspace = true
carrot-assistant-slash-command.workspace = true
async-trait.workspace = true

carrot-buffer-diff.workspace = true
carrot-call = { workspace = true, features = ["test-support"] }
carrot-channel.workspace = true
carrot-client = { workspace = true, features = ["test-support"] }
carrot-collab = { workspace = true, features = ["test-support"] }
carrot-collab-ui = { workspace = true, features = ["test-support"] }
inazuma-collections = { workspace = true, features = ["test-support"] }
carrot-command-palette.workspace = true
carrot-command-palette-hooks.workspace = true

ctor.workspace = true
carrot-dap = { workspace = true, features = ["test-support"] }
carrot-dap-adapters = { workspace = true, features = ["test-support"] }

carrot-debugger-ui = { workspace = true, features = ["test-support"] }
carrot-editor = { workspace = true, features = ["test-support"] }
carrot-extension.workspace = true
carrot-fs = { workspace = true, features = ["test-support"] }
carrot-git = { workspace = true, features = ["test-support"] }
carrot-git-hosting-providers.workspace = true
carrot-git-ui = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
inazuma-gpui-util.workspace = true
inazuma-tokio.workspace = true

indoc.workspace = true
carrot-language = { workspace = true, features = ["test-support"] }
carrot-language-model = { workspace = true, features = ["test-support"] }
carrot-livekit-client =  { workspace = true, features = ["test-support"] }
carrot-lsp = { workspace = true, features = ["test-support"] }
inazuma-menu.workspace = true
carrot-multi-buffer = { workspace = true, features = ["test-support"] }
carrot-node-runtime.workspace = true
carrot-notifications = { workspace = true, features = ["test-support"] }
pretty_assertions.workspace = true
carrot-project = { workspace = true, features = ["test-support"] }
carrot-prompt-store.workspace = true
carrot-recent-projects = { workspace = true, features = ["test-support"] }
carrot-release-channel.workspace = true
carrot-remote = { workspace = true, features = ["test-support"] }
carrot-remote-server.workspace = true
carrot-rpc = { workspace = true, features = ["test-support"] }
sea-orm = { workspace = true, features = ["sqlx-sqlite"] }
serde_json.workspace = true
carrot-session = { workspace = true, features = ["test-support"] }
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
smol.workspace = true
sqlx = { workspace = true, features = ["sqlite"] }
carrot-task.workspace = true
carrot-theme-settings = { workspace = true, features = ["test-support"] }
carrot-theme.workspace = true

unindent.workspace = true
inazuma-util.workspace = true
carrot-workspace = { workspace = true, features = ["test-support"] }
carrot-worktree = { workspace = true, features = ["test-support"] }
carrot-actions.workspace = true
carrot-log.workspace = true
