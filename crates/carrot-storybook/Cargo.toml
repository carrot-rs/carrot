[package]
name = "carrot-storybook"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[[bin]]
name = "storybook"
path = "src/storybook.rs"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive", "string"] }
ctrlc.workspace = true
dialoguer.workspace = true
carrot-editor.workspace = true
inazuma-fuzzy.workspace = true
inazuma = { workspace = true, default-features = true }
inazuma-platform.workspace = true
indoc.workspace = true
carrot-language.workspace = true
log.workspace = true
inazuma-menu.workspace = true
inazuma-picker.workspace = true
carrot-reqwest-client.workspace = true
rust-embed.workspace = true
inazuma-settings-framework.workspace = true
carrot-theme-settings.workspace = true
simplelog.workspace = true
inazuma-story.workspace = true
strum = { workspace = true, features = ["derive"] }
carrot-theme.workspace = true
carrot-title-bar = { workspace = true, features = ["stories"] }
carrot-ui = { workspace = true, features = ["stories"] }

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
