[package]
name = "carrot-markdown"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/markdown.rs"
doctest = false

[features]
test-support = [
    "inazuma/test-support",
    "inazuma-util/test-support"
]

[dependencies]
anyhow.workspace = true
base64.workspace = true
inazuma-collections.workspace = true
futures.workspace = true
inazuma.workspace = true
html5ever.workspace = true
carrot-language.workspace = true
linkify.workspace = true
log.workspace = true
markup5ever_rcdom.workspace = true
mermaid-rs-renderer.workspace = true
pulldown-cmark.workspace = true
inazuma-settings-framework.workspace = true
stacksafe.workspace = true
inazuma-sum_tree.workspace = true
carrot-theme.workspace = true
carrot-theme-settings.workspace = true
carrot-ui.workspace = true
inazuma-util.workspace = true

[dev-dependencies]
carrot-assets.workspace = true
env_logger.workspace = true
carrot-fs = {workspace = true, features = ["test-support"]}
inazuma = { workspace = true, features = ["test-support"] }
carrot-language = { workspace = true, features = ["test-support"] }
carrot-languages = { workspace = true, features = ["load-grammars"] }
carrot-node-runtime.workspace = true
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
