[package]
name = "carrot-editor"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license-file.workspace = true

[lints]
workspace = true

[lib]
path = "src/editor.rs"
doctest = false

[features]
test-support = [
    "inazuma-text/test-support",
    "carrot-language/test-support",
    "inazuma/test-support",
    "carrot-multi-buffer/test-support",
    "carrot-project/test-support",
    "carrot-theme/test-support",
    "inazuma-util/test-support",
    "carrot-workspace/test-support",
    "tree-sitter-c",
    "tree-sitter-rust",
    "tree-sitter-typescript",
    "tree-sitter-html",
    "proptest",
    "unindent",
]

[dependencies]
aho-corasick.workspace = true
anyhow.workspace = true
