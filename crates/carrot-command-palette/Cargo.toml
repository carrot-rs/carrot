carrot-ui.workspace = true
inazuma-util.workspace = true
carrot-telemetry.workspace = true
carrot-workspace.workspace = true
carrot-actions.workspace = true

[dev-dependencies]

carrot-db = { workspace = true, features = ["test-support"] }
carrot-editor = { workspace = true, features = ["test-support"] }

carrot-go-to-line.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
