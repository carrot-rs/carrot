name: Audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    # Daily 05:00 UTC — RustSec advisories land on a constant trickle;
    # a daily check catches them within 24h regardless of repo activity.
    - cron: "0 5 * * *"

permissions:
  contents: read
  issues: write

jobs:
  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
