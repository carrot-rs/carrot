name: Bug Report
description: Report something that is broken in Carrot.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the
        repro, the faster we can fix it. **Search existing issues first** —
        duplicates slow everyone down.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest released or `main`-built Carrot.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: e.g. "Cmd+T on macOS opens a new tab but the cursor stays in the old one."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Numbered steps. Include exact commands, key bindings, sample input.
      placeholder: |
        1. Launch `carrot`.
        2. Run `git status` in `~/code/some-repo`.
        3. Press `Cmd+K`.
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (X11)
        - Linux (Wayland)
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: e.g. macOS 15.4, Ubuntu 24.04 + sway 1.10, Windows 11 24H2

  - type: input
    id: shell
    attributes:
      label: Shell + Version
      placeholder: e.g. nushell 0.99, zsh 5.9, fish 3.7, bash 5.2
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU / Backend
      description: Output of `carrot --gpu-info` if available, otherwise model + driver.
      placeholder: e.g. Apple M3 Pro / Metal, NVIDIA RTX 4070 / Vulkan 1.3.290

  - type: input
    id: version
    attributes:
      label: Carrot Version / Commit
      placeholder: e.g. v0.1.0, or main@abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `RUST_LOG=carrot=debug RUST_BACKTRACE=1 carrot 2> carrot.log` and paste the relevant slice. Wrap with triple backticks.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, related issues, anything else.
