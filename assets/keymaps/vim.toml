[[section]]
context = "vim_mode == helix_select"

[section.bindings]
"v" = "vim::NormalBefore"
";" = "vim::HelixCollapseSelection"
"~" = "vim::ChangeCase"
"ctrl-a" = "vim::Increment"
"ctrl-x" = "vim::Decrement"
"shift-j" = "vim::JoinLines"
"i" = "vim::InsertBefore"
"a" = "vim::InsertAfter"
"o" = "vim::InsertLineBelow"
"shift-o" = "vim::InsertLineAbove"
"p" = "vim::Paste"
"u" = "vim::Undo"
"r" = "vim::PushReplace"
"s" = "vim::Substitute"
"ctrl-pageup" = "pane::ActivatePreviousItem"
"ctrl-pagedown" = "pane::ActivateNextItem"
"." = "vim::Repeat"
"alt-." = "vim::RepeatFind"

[[section]]
context = "vim_mode == insert"

[section.bindings]
"ctrl-c" = "vim::NormalBefore"
"ctrl-[" = "vim::NormalBefore"
"escape" = "vim::NormalBefore"
"ctrl-x" = { action = "vim::NoAction" }
"ctrl-x ctrl-o" = "editor::ShowCompletions"
"ctrl-x ctrl-a" = "assistant::InlineAssist" # carrot specific
"ctrl-x ctrl-c" = "editor::ShowEditPrediction" # carrot specific
"ctrl-x ctrl-l" = "editor::ToggleCodeActions" # carrot specific
"ctrl-x ctrl-z" = "editor::Cancel"
"ctrl-x ctrl-e" = "vim::LineDown"
"ctrl-x ctrl-y" = "vim::LineUp"
"ctrl-w" = { action = "editor::DeleteToPreviousWordStart", data = { ignore_newlines = false, ignore_brackets = false } }
"ctrl-u" = "editor::DeleteToBeginningOfLine"
"ctrl-t" = "vim::Indent"
"ctrl-d" = "vim::Outdent"
"ctrl-y" = "vim::InsertFromAbove"
"ctrl-e" = "vim::InsertFromBelow"
"ctrl-k" = { action = "vim::PushDigraph", data = {} }
"ctrl-v" = { action = "vim::PushLiteral", data = {} }
"ctrl-shift-v" = "editor::Paste" # note: this is *very* similar to ctrl-v in vim, but ctrl-shift-v on linux is the typical shortcut for paste when ctrl-v is already in use.
"ctrl-q" = { action = "vim::PushLiteral", data = {} }
"ctrl-shift-q" = { action = "vim::PushLiteral", data = {} }
"ctrl-r" = "vim::PushRegister"
"insert" = "vim::ToggleReplace"
"ctrl-o" = "vim::TemporaryNormal"
"ctrl-s" = "editor::ShowSignatureHelp"

[[section]]
context = "showing_completions"

[section.bindings]
"ctrl-d" = "vim::ScrollDown"
"ctrl-u" = "vim::ScrollUp"
"ctrl-e" = "vim::LineDown"
"ctrl-y" = "vim::LineUp"

[[section]]
context = "(vim_mode == normal || vim_mode == helix_normal) && !menu"

[section.bindings]
"escape" = "editor::Cancel"
"shift-d" = "vim::DeleteToEndOfLine"
"shift-j" = "vim::JoinLines"
"shift-y" = "vim::YankLine"
"shift-i" = "vim::InsertFirstNonWhitespace"
"shift-a" = "vim::InsertEndOfLine"
"o" = "vim::InsertLineBelow"
"shift-o" = "vim::InsertLineAbove"
"~" = "vim::ChangeCase"
"ctrl-a" = "vim::Increment"
"ctrl-x" = "vim::Decrement"
"p" = "vim::Paste"
"shift-p" = { action = "vim::Paste", data = { before = true } }
"u" = "vim::Undo"
"shift-u" = "vim::UndoLastLine"
"r" = "vim::PushReplace"
"s" = "vim::Substitute"
"shift-s" = "vim::SubstituteLine"
"\"" = "vim::PushRegister"
"ctrl-pagedown" = "pane::ActivateNextItem"
"ctrl-pageup" = "pane::ActivatePreviousItem"

[[section]]
context = "VimControl && vim_mode == helix_normal && !menu"

[section.bindings]
"j" = { action = "vim::Down", data = { display_lines = true } }
"down" = { action = "vim::Down", data = { display_lines = true } }
"k" = { action = "vim::Up", data = { display_lines = true } }
"up" = { action = "vim::Up", data = { display_lines = true } }
"g j" = "vim::Down"
"g down" = "vim::Down"
"g k" = "vim::Up"
"g up" = "vim::Up"
"escape" = "vim::SwitchToHelixNormalMode"
"i" = "vim::HelixInsert"
"a" = "vim::HelixAppend"
"shift-a" = "vim::HelixInsertEndOfLine"
"ctrl-[" = "editor::Cancel"

[[section]]
context = "vim_mode == helix_select && !menu"

[section.bindings]
"escape" = "vim::SwitchToHelixNormalMode"

[[section]]
context = "(vim_mode == helix_normal || vim_mode == helix_select) && !menu"

[section.bindings]
# Movement
"h" = "vim::WrappingLeft"
"left" = "vim::WrappingLeft"
"l" = "vim::WrappingRight"
"right" = "vim::WrappingRight"
"t" = { action = "vim::PushFindForward", data = { before = true, multiline = true } }
"f" = { action = "vim::PushFindForward", data = { before = false, multiline = true } }
"shift-t" = { action = "vim::PushFindBackward", data = { after = true, multiline = true } }
"shift-f" = { action = "vim::PushFindBackward", data = { after = false, multiline = true } }
"alt-." = "vim::RepeatFind"

# Changes
"shift-r" = "editor::Paste"
"`" = "vim::ConvertToLowerCase"
"alt-`" = "vim::ConvertToUpperCase"
"insert" = "vim::InsertBefore" # not a helix default
"shift-u" = "editor::Redo"
"ctrl-r" = "vim::Redo" # not a helix default
"y" = "vim::HelixYank"
"p" = "vim::HelixPaste"
"shift-p" = { action = "vim::HelixPaste", data = { before = true } }
">" = "vim::Indent"
"<" = "vim::Outdent"
"=" = "vim::AutoIndent"
"d" = "vim::HelixDelete"
"alt-d" = "editor::Delete" # Delete selection, without yanking
"c" = "vim::HelixSubstitute"
"alt-c" = "vim::HelixSubstituteNoYank"

# Selection manipulation
"s" = "vim::HelixSelectRegex"
"alt-s" = { action = "editor::SplitSelectionIntoLines", data = { keep_selections = true } }
";" = "vim::HelixCollapseSelection"
"alt-;" = "vim::OtherEnd"
"," = "vim::HelixKeepNewestSelection"
"shift-c" = "vim::HelixDuplicateBelow"
"alt-shift-c" = "vim::HelixDuplicateAbove"
"%" = "editor::SelectAll"
"x" = "vim::HelixSelectLine"
"shift-x" = "editor::SelectLine"
"ctrl-c" = "editor::ToggleComments"
"alt-o" = "editor::SelectLargerSyntaxNode"
"alt-i" = "editor::SelectSmallerSyntaxNode"
"alt-p" = "editor::SelectPreviousSyntaxNode"
"alt-n" = "editor::SelectNextSyntaxNode"

# Search
