# Vim keymap for Carrot

[[section]]
context = "VimControl && !menu"

[section.bindings]
"i" = { action = "vim::PushObject", data = { around = false } }
"a" = { action = "vim::PushObject", data = { around = true } }
"left" = "vim::Left"
"h" = "vim::Left"
"backspace" = "vim::WrappingLeft"
"down" = "vim::Down"
"ctrl-j" = "vim::Down"
"j" = "vim::Down"
"ctrl-m" = "vim::NextLineStart"
"+" = "vim::NextLineStart"
"enter" = "vim::NextLineStart"
"-" = "vim::PreviousLineStart"
"shift-tab" = "vim::Tab"
"tab" = "vim::Tab"
"up" = "vim::Up"
"k" = "vim::Up"
"right" = "vim::Right"
"l" = "vim::Right"
"space" = "vim::WrappingRight"
"end" = "vim::EndOfLine"
"$" = "vim::EndOfLine"
"^" = "vim::FirstNonWhitespace"
"_" = "vim::StartOfLineDownward"
"g _" = "vim::EndOfLineDownward"
"shift-g" = "vim::EndOfDocument"
"{" = "vim::StartOfParagraph"
"}" = "vim::EndOfParagraph"
"(" = "vim::SentenceBackward"
")" = "vim::SentenceForward"
"|" = "vim::GoToColumn"

# Word motions
"w" = "vim::NextWordStart"
"e" = "vim::NextWordEnd"
"b" = "vim::PreviousWordStart"
"g e" = "vim::PreviousWordEnd"
# Subword motions
# "w" = "vim::NextSubwordStart"
# "b" = "vim::PreviousSubwordStart"
# "e" = "vim::NextSubwordEnd"
# "g e" = "vim::PreviousSubwordEnd"
"shift-w" = { action = "vim::NextWordStart", data = { ignore_punctuation = true } }
"shift-e" = { action = "vim::NextWordEnd", data = { ignore_punctuation = true } }
"shift-b" = { action = "vim::PreviousWordStart", data = { ignore_punctuation = true } }
"g shift-e" = { action = "vim::PreviousWordEnd", data = { ignore_punctuation = true } }
"/" = "vim::Search"
"g /" = "pane::DeploySearch"
"?" = { action = "vim::Search", data = { backwards = true } }
"*" = "vim::MoveToNext"
"#" = "vim::MoveToPrevious"
"n" = "vim::MoveToNextMatch"
"shift-n" = "vim::MoveToPreviousMatch"
"%" = { action = "vim::Matching", data = { match_quotes = true } }
"f" = { action = "vim::PushFindForward", data = { before = false, multiline = false } }
"t" = { action = "vim::PushFindForward", data = { before = true, multiline = false } }
"shift-f" = { action = "vim::PushFindBackward", data = { after = false, multiline = false } }
"shift-t" = { action = "vim::PushFindBackward", data = { after = true, multiline = false } }
"m" = "vim::PushMark"
"'" = { action = "vim::PushJump", data = { line = true } }
"`" = { action = "vim::PushJump", data = { line = false } }
";" = "vim::RepeatFind"
"," = "vim::RepeatFindReversed"
"ctrl-o" = "pane::GoBack"
"ctrl-i" = "pane::GoForward"
"ctrl-]" = "editor::GoToDefinition"
"ctrl-t" = "pane::GoToOlderTag"
"escape" = "vim::SwitchToNormalMode"
"ctrl-[" = "vim::SwitchToNormalMode"
"v" = "vim::ToggleVisual"
"shift-v" = "vim::ToggleVisualLine"
"ctrl-g" = "vim::ShowLocation"
"ctrl-v" = "vim::ToggleVisualBlock"
"ctrl-q" = "vim::ToggleVisualBlock"
"shift-k" = "editor::Hover"
"shift-r" = "vim::ToggleReplace"
"0" = "vim::StartOfLine"
"home" = "vim::StartOfLine"
"ctrl-f" = "vim::PageDown"
"pagedown" = "vim::PageDown"
"ctrl-b" = "vim::PageUp"
"pageup" = "vim::PageUp"
"ctrl-d" = "vim::ScrollDown"
"ctrl-u" = "vim::ScrollUp"
"ctrl-e" = "vim::LineDown"
"ctrl-y" = "vim::LineUp"
# "g" commands
"g shift-r" = "vim::PushReplaceWithRegister"
"g r n" = "editor::Rename"
"g r r" = "editor::FindAllReferences"
"g r i" = "editor::GoToImplementation"
"g r a" = "editor::ToggleCodeActions"
"g g" = "vim::StartOfDocument"
"g h" = "editor::Hover"
"g B" = "editor::BlameHover"
"g d" = "editor::GoToDefinition"
"g shift-d" = "editor::GoToDeclaration"
"g y" = "editor::GoToTypeDefinition"
"g shift-i" = "editor::GoToImplementation"
"g x" = "editor::OpenUrl"
"g f" = "editor::OpenSelectedFilename"
"g n" = "vim::SelectNextMatch"
"g shift-n" = "vim::SelectPreviousMatch"
"g l" = "vim::SelectNext"
"g shift-l" = "vim::SelectPrevious"
"g >" = { action = "editor::SelectNext", data = { replace_newest = true } }
"g <" = { action = "editor::SelectPrevious", data = { replace_newest = true } }
"g a" = "editor::SelectAllMatches"
"g s" = "outline::Toggle"
"g shift-o" = "outline::Toggle"
"g shift-s" = "project_symbols::Toggle"
"g ." = "editor::ToggleCodeActions" # carrot specific
"g shift-a" = "editor::FindAllReferences" # carrot specific
"g space" = "editor::OpenExcerpts" # carrot specific
"g *" = { action = "vim::MoveToNext", data = { partial_word = true } }
"g #" = { action = "vim::MoveToPrevious", data = { partial_word = true } }
"g j" = { action = "vim::Down", data = { display_lines = true } }
"g down" = { action = "vim::Down", data = { display_lines = true } }
"g k" = { action = "vim::Up", data = { display_lines = true } }
"g up" = { action = "vim::Up", data = { display_lines = true } }
"g $" = { action = "vim::EndOfLine", data = { display_lines = true } }
"g end" = { action = "vim::EndOfLine", data = { display_lines = true } }
"g 0" = { action = "vim::StartOfLine", data = { display_lines = true } }
"g home" = { action = "vim::StartOfLine", data = { display_lines = true } }
"g shift-m" = { action = "vim::MiddleOfLine", data = { display_lines = true } }
"g ^" = { action = "vim::FirstNonWhitespace", data = { display_lines = true } }
"g v" = "vim::RestoreVisualSelection"
"g ]" = "editor::GoToDiagnostic"
"g [" = "editor::GoToPreviousDiagnostic"
"g i" = "vim::InsertAtPrevious"
"g ," = "vim::ChangeListNewer"
"g ;" = "vim::ChangeListOlder"
"shift-h" = "vim::WindowTop"
"shift-m" = "vim::WindowMiddle"
"shift-l" = "vim::WindowBottom"
"q" = "vim::ToggleRecord"
"shift-q" = "vim::ReplayLastRecording"
"@" = "vim::PushReplayRegister"
# z commands
"z enter" = { action = "workspace::SendKeystrokes", data = ["z", "t", "^"] }
"z -" = { action = "workspace::SendKeystrokes", data = ["z", "b", "^"] }
"z ^" = { action = "workspace::SendKeystrokes", data = ["shift-h", "k", "z", "b", "^"] }
"z +" = { action = "workspace::SendKeystrokes", data = ["shift-l", "j", "z", "t", "^"] }
"z t" = "editor::ScrollCursorTop"
"z z" = "editor::ScrollCursorCenter"
"z ." = { action = "workspace::SendKeystrokes", data = ["z", "z", "^"] }
"z b" = "editor::ScrollCursorBottom"
"z a" = "editor::ToggleFold"
"z shift-a" = "editor::ToggleFoldRecursive"
"z c" = "editor::Fold"
"z shift-c" = "editor::FoldRecursive"
"z o" = "editor::UnfoldLines"
"z shift-o" = "editor::UnfoldRecursive"
"z f" = "editor::FoldSelectedRanges"
"z shift-m" = "editor::FoldAll"
"z shift-r" = "editor::UnfoldAll"
"z l" = "vim::ColumnRight"
"z h" = "vim::ColumnLeft"
"z shift-l" = "vim::HalfPageRight"
"z shift-h" = "vim::HalfPageLeft"
"shift-z shift-q" = { action = "pane::CloseActiveItem", data = { save_intent = "skip" } }
"shift-z shift-z" = { action = "pane::CloseActiveItem", data = { save_intent = "save_all" } }
# Count support
"1" = { action = "vim::Number", data = 1 }
"2" = { action = "vim::Number", data = 2 }
"3" = { action = "vim::Number", data = 3 }
"4" = { action = "vim::Number", data = 4 }
"5" = { action = "vim::Number", data = 5 }
"6" = { action = "vim::Number", data = 6 }
"7" = { action = "vim::Number", data = 7 }
"8" = { action = "vim::Number", data = 8 }
"9" = { action = "vim::Number", data = 9 }
"ctrl-w d" = "editor::GoToDefinitionSplit"
"ctrl-w g d" = "editor::GoToDefinitionSplit"
"ctrl-w ]" = "editor::GoToDefinitionSplit"
"ctrl-w ctrl-]" = "editor::GoToDefinitionSplit"
"ctrl-w shift-d" = "editor::GoToTypeDefinitionSplit"
"ctrl-w g shift-d" = "editor::GoToTypeDefinitionSplit"
"ctrl-w space" = "editor::OpenExcerptsSplit"
"ctrl-w g space" = "editor::OpenExcerptsSplit"
"ctrl-^" = "pane::AlternateFile"
"." = "vim::Repeat"

[[section]]
context = "vim_mode == normal || vim_mode == visual || vim_mode == operator"

[section.bindings]
"] ]" = "vim::NextSectionStart"
"] [" = "vim::NextSectionEnd"
"[ [" = "vim::PreviousSectionStart"
"[ ]" = "vim::PreviousSectionEnd"
"] m" = "vim::NextMethodStart"
"] shift-m" = "vim::NextMethodEnd"
"[ m" = "vim::PreviousMethodStart"
"[ shift-m" = "vim::PreviousMethodEnd"
"[ *" = "vim::PreviousComment"
"[ /" = "vim::PreviousComment"
"] *" = "vim::NextComment"
"] /" = "vim::NextComment"
"[ -" = "vim::PreviousLesserIndent"
"[ +" = "vim::PreviousGreaterIndent"
"[ =" = "vim::PreviousSameIndent"
"] -" = "vim::NextLesserIndent"
"] +" = "vim::NextGreaterIndent"
"] =" = "vim::NextSameIndent"
"] b" = "pane::ActivateNextItem"
"[ b" = "pane::ActivatePreviousItem"
"] shift-b" = "pane::ActivateLastItem"
"[ shift-b" = { action = "pane::ActivateItem", data = 0 }
"] space" = "vim::InsertEmptyLineBelow"
"[ space" = "vim::InsertEmptyLineAbove"
"[ e" = "editor::MoveLineUp"
"] e" = "editor::MoveLineDown"
"[ f" = "workspace::FollowNextCollaborator"
"] f" = "workspace::FollowNextCollaborator"
"] }" = { action = "vim::UnmatchedForward", data = { char = "}" } }
"[ {" = { action = "vim::UnmatchedBackward", data = { char = "{" } }
"] )" = { action = "vim::UnmatchedForward", data = { char = ")" } }
"[ (" = { action = "vim::UnmatchedBackward", data = { char = "(" } }
"[ r" = "vim::GoToPreviousReference"
"] r" = "vim::GoToNextReference"
# tree-sitter related commands
"[ x" = "vim::SelectLargerSyntaxNode"
"] x" = "vim::SelectSmallerSyntaxNode"

[[section]]
context = "vim_mode == normal"

[section.bindings]
"i" = "vim::InsertBefore"
"a" = "vim::InsertAfter"
"ctrl-[" = "editor::Cancel"
":" = "command_palette::Toggle"
"c" = "vim::PushChange"
"shift-c" = "vim::ChangeToEndOfLine"
"d" = "vim::PushDelete"
"delete" = "vim::DeleteRight"
"g shift-j" = "vim::JoinLinesNoWhitespace"
"y" = "vim::PushYank"
"shift-y" = "vim::YankLine"
"x" = "vim::DeleteRight"
"shift-x" = "vim::DeleteLeft"
"ctrl-a" = "vim::Increment"
"ctrl-x" = "vim::Decrement"
"ctrl-r" = "vim::Redo"
">" = "vim::PushIndent"
"<" = "vim::PushOutdent"
"=" = "vim::PushAutoIndent"
"!" = "vim::PushShellCommand"
"g u" = "vim::PushLowercase"
"g shift-u" = "vim::PushUppercase"
"g ~" = "vim::PushOppositeCase"
"g ?" = "vim::PushRot13"
# "g ?" = "vim::PushRot47"
"g w" = "vim::PushRewrap"
"g q" = "vim::PushRewrap"
"insert" = "vim::InsertBefore"
"] d" = "editor::GoToDiagnostic"
"[ d" = "editor::GoToPreviousDiagnostic"
"] c" = "editor::GoToHunk"
"[ c" = "editor::GoToPreviousHunk"
"g c" = "vim::PushToggleComments"

[[section]]
context = "VimControl && VimCount"

[section.bindings]
"0" = { action = "vim::Number", data = 0 }
":" = "vim::CountCommand"
"%" = "vim::GoToPercentage"

[[section]]
context = "vim_mode == visual"

[section.bindings]
":" = "vim::VisualCommand"
"u" = "vim::ConvertToLowerCase"
"shift-u" = "vim::ConvertToUpperCase"
"shift-o" = "vim::OtherEnd"
"o" = "vim::OtherEndRowAware"
"d" = "vim::VisualDelete"
"x" = "vim::VisualDelete"
"delete" = "vim::VisualDelete"
"shift-d" = "vim::VisualDeleteLine"
"shift-x" = "vim::VisualDeleteLine"
"y" = "vim::VisualYank"
"shift-y" = "vim::VisualYankLine"
"p" = "vim::Paste"
"shift-p" = { action = "vim::Paste", data = { preserve_clipboard = true } }
"c" = "vim::Substitute"
"s" = "vim::Substitute"
"shift-r" = "vim::SubstituteLine"
"shift-s" = "vim::SubstituteLine"
"~" = "vim::ChangeCase"
"*" = { action = "vim::MoveToNext", data = { partial_word = true } }
"#" = { action = "vim::MoveToPrevious", data = { partial_word = true } }
"ctrl-a" = "vim::Increment"
"ctrl-x" = "vim::Decrement"
"g ctrl-a" = { action = "vim::Increment", data = { step = true } }
"g ctrl-x" = { action = "vim::Decrement", data = { step = true } }
"shift-i" = "vim::InsertBefore"
"shift-a" = "vim::InsertAfter"
"g shift-i" = "vim::VisualInsertFirstNonWhiteSpace"
"g shift-a" = "vim::VisualInsertEndOfLine"
"shift-j" = "vim::JoinLines"
"g shift-j" = "vim::JoinLinesNoWhitespace"
"r" = "vim::PushReplace"
"ctrl-c" = "vim::SwitchToNormalMode"
"ctrl-[" = "vim::SwitchToNormalMode"
"escape" = "vim::SwitchToNormalMode"
">" = "vim::Indent"
"<" = "vim::Outdent"
"=" = "vim::AutoIndent"
"!" = "vim::ShellCommand"
"i" = { action = "vim::PushObject", data = { around = false } }
"a" = { action = "vim::PushObject", data = { around = true } }
"g shift-r" = { action = "vim::Paste", data = { preserve_clipboard = true } }
