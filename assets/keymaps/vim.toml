"space k" = "editor::Hover"
"space s" = "outline::Toggle"
"space shift-s" = "project_symbols::Toggle"
"space d" = "editor::GoToDiagnostic"
"space r" = "editor::Rename"
"space a" = "editor::ToggleCodeActions"
"space h" = "editor::SelectAllMatches"
"space c" = "editor::ToggleComments"
"space p" = "editor::Paste"
"space y" = "editor::Copy"
"space /" = "pane::DeploySearch"

# Other
":" = "command_palette::Toggle"
"m" = "vim::PushHelixMatch"
"]" = { action = "vim::PushHelixNext", data = { around = true } }
"[" = { action = "vim::PushHelixPrevious", data = { around = true } }
"g q" = "vim::PushRewrap"
"g w" = "vim::PushRewrap" # not a helix default & clashes with helix `goto_word`

[[section]]
context = "vim_mode == insert && !(showing_code_actions || showing_completions)"

[section.bindings]
"ctrl-p" = "editor::ShowWordCompletions"
"ctrl-n" = "editor::ShowWordCompletions"

[[section]]
